<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    <title>Gambar Aja Kok Repot</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #ffffff;
            overscroll-behavior: none;
            touch-action: none;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 18px;
            color: #555;
        }
    </style>
</head>
<body>
<div id="loader">Loading…</div>
<script type="application/javascript">
  // Hide the loader once Compose mounts its canvas.
  const observer = new MutationObserver(() => {
    if (document.querySelector('canvas')) {
      const loader = document.getElementById('loader');
      if (loader) loader.remove();
      observer.disconnect();
    }
  });
  observer.observe(document.body, { childList: true, subtree: true });

  // Request browser fullscreen in response to the first user gesture.
  //
  // Browsers require this to be called inside a real user-activation (pointer
  // or key) event handler, so we can't do it on page load. We listen for the
  // broadest set of events (click/touchend/pointerup/keydown) in the CAPTURE
  // phase — this fires before Compose's canvas handler can stopPropagation or
  // consume the event, and matches the user-activation contract in all
  // Chromium variants (Chrome/Opera/Edge) as well as Firefox and Safari.
  //
  // We re-try on every gesture until fullscreen actually engages, because
  // some browsers reject the first call (e.g. if the .wasm hasn't finished
  // streaming yet, or if an earlier promise chain in `requestFullscreen()`
  // consumed user activation).
  const FS_EVENTS = ['click', 'touchend', 'pointerup', 'keydown'];
  function inFullscreen() {
    return !!(document.fullscreenElement
           || document.webkitFullscreenElement
           || document.mozFullScreenElement
           || document.msFullscreenElement);
  }
  function tryEnterFullscreen() {
    if (inFullscreen()) { detachFsListeners(); return; }
    const el = document.documentElement;
    const req = el.requestFullscreen
             || el.webkitRequestFullscreen
             || el.mozRequestFullScreen
             || el.msRequestFullscreen;
    if (!req) { detachFsListeners(); return; }
    try {
      const result = req.call(el);
      if (result && typeof result.then === 'function') {
        result.then(detachFsListeners).catch(function (err) {
          // Don't detach — keep listening so the next user gesture can retry.
          // Common rejection: "API can only be initiated by a user gesture"
          // — which can happen if Compose already marked the event handled.
          console.warn('requestFullscreen rejected, will retry on next gesture:', err);
        });
      } else {
        detachFsListeners();
      }
    } catch (err) {
      console.warn('requestFullscreen threw, will retry on next gesture:', err);
    }
  }
  function detachFsListeners() {
    FS_EVENTS.forEach(function (ev) {
      window.removeEventListener(ev, tryEnterFullscreen, true);
    });
  }
  FS_EVENTS.forEach(function (ev) {
    window.addEventListener(ev, tryEnterFullscreen, true);
  });
</script>
<script type="application/javascript" src="gambar-aja-kok-repot.js"></script>
</body>
</html>
