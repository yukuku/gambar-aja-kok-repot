<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    <title>Gambar Aja Kok Repot</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #ffffff;
            overscroll-behavior: none;
            touch-action: none;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 18px;
            color: #555;
        }
    </style>
</head>
<body>
<div id="loader">Loading…</div>
<script type="application/javascript">
  // Hide the loader once Compose mounts its canvas.
  const observer = new MutationObserver(() => {
    if (document.querySelector('canvas')) {
      const loader = document.getElementById('loader');
      if (loader) loader.remove();
      observer.disconnect();
    }
  });
  observer.observe(document.body, { childList: true, subtree: true });

  // Request browser fullscreen in response to user gestures — and re-request
  // every time the user touches after fullscreen has been dropped (e.g. after
  // switching to another tab and back, or after pressing Esc). A toddler-
  // friendly UX: any touch should restore the immersive canvas.
  //
  // Browsers require requestFullscreen to be called inside a real user-
  // activation (pointer or key) event handler, so we can't do it on page load.
  // We listen in the CAPTURE phase so we fire before Compose's canvas handler
  // can consume the event, matching the user-activation contract across
  // Chromium (Chrome/Opera/Edge), Firefox, and Safari.
  const FS_EVENTS = ['click', 'touchend', 'pointerup', 'keydown'];
  function inFullscreen() {
    return !!(document.fullscreenElement
           || document.webkitFullscreenElement
           || document.mozFullScreenElement
           || document.msFullscreenElement);
  }
  function tryEnterFullscreen() {
    if (inFullscreen()) return;
    const el = document.documentElement;
    const req = el.requestFullscreen
             || el.webkitRequestFullscreen
             || el.mozRequestFullScreen
             || el.msRequestFullscreen;
    if (!req) return;
    try {
      const result = req.call(el);
      if (result && typeof result.then === 'function') {
        result.catch(function (err) {
          // Common rejection: "API can only be initiated by a user gesture"
          // — can happen if Compose already marked the event handled, or the
          // browser is rate-limiting after a recent Esc. Next gesture retries.
          console.warn('requestFullscreen rejected, will retry on next gesture:', err);
        });
      }
    } catch (err) {
      console.warn('requestFullscreen threw, will retry on next gesture:', err);
    }
  }
  FS_EVENTS.forEach(function (ev) {
    window.addEventListener(ev, tryEnterFullscreen, true);
  });
</script>
<script type="application/javascript" src="gambar-aja-kok-repot.js"></script>
</body>
</html>
