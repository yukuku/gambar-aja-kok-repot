<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    <title>Gambar Aja Kok Repot</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #ffffff;
            overscroll-behavior: none;
            touch-action: none;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 16px;
            color: #555;
            white-space: pre;
        }
    </style>
</head>
<body>
<div id="loader">Loading ...</div>
<script type="application/javascript">
  // Hide the loader once Compose mounts its canvas.
  const observer = new MutationObserver(() => {
    if (document.querySelector('canvas')) {
      const loader = document.getElementById('loader');
      if (loader) loader.remove();
      observer.disconnect();
    }
  });
  observer.observe(document.body, { childList: true, subtree: true });

  // Loading progress bar. The app bundle is ~10 MB (JS + two .wasm files), so a
  // static "Loading ..." sits for several seconds on slow connections. We track
  // bytes received vs Content-Length across every .js / .wasm fetch and render
  // an ASCII bar like:  Loading ... (==============-------------------------)
  //
  // - The main JS is fetched here (instead of a <script src=…> tag) so we can
  //   observe its byte stream; it's then executed via a Blob URL.
  // - Subsequent WASM fetches initiated by the Kotlin/Wasm runtime are caught
  //   by wrapping window.fetch. We clone the Response so the consumer
  //   (WebAssembly.instantiateStreaming, typically) still gets a fresh body.
  // - Content-Length can reflect a compressed size while the reader yields
  //   decompressed bytes, so the fraction is clamped to 1.0.
  (function () {
    const loader = document.getElementById('loader');
    const BAR_LEN = 40;
    const state = { received: 0, total: 0 };

    function render() {
      if (state.total === 0) {
        loader.textContent = 'Loading ...';
        return;
      }
      const frac = Math.min(1, state.received / state.total);
      const filled = Math.round(frac * BAR_LEN);
      loader.textContent =
        'Loading ... (' +
        '='.repeat(filled) +
        '-'.repeat(BAR_LEN - filled) +
        ')';
    }

    function trackStream(response) {
      const len = Number(response.headers.get('Content-Length')) || 0;
      if (len > 0) {
        state.total += len;
        render();
      }
      const reader = response.body.getReader();
      return new Promise(function (resolve, reject) {
        const chunks = [];
        (function pump() {
          reader.read().then(function (r) {
            if (r.done) { resolve(chunks); return; }
            chunks.push(r.value);
            state.received += r.value.length;
            render();
            pump();
          }, reject);
        })();
      });
    }

    // Intercept WASM fetches (initiated from inside the Kotlin/Wasm bootstrap).
    const origFetch = window.fetch.bind(window);
    window.fetch = function (input, init) {
      const url = typeof input === 'string'
        ? input
        : (input && input.url) ? input.url : '';
      const p = origFetch(input, init);
      if (/\.wasm(\?|$)/i.test(url)) {
        return p.then(function (resp) {
          if (!resp.ok || !resp.body) return resp;
          trackStream(resp.clone()).catch(function () {});
          return resp;
        });
      }
      return p;
    };

    // Fetch and execute the main app bundle with progress tracking. The build
    // rewrites APP_SCRIPT_URL to add a cache-busting query string.
    const APP_SCRIPT_URL = "gambar-aja-kok-repot.js";
    render();
    origFetch(APP_SCRIPT_URL).then(function (resp) {
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return trackStream(resp);
    }).then(function (chunks) {
      const blob = new Blob(chunks, { type: 'application/javascript' });
      const url = URL.createObjectURL(blob);
      const script = document.createElement('script');
      script.src = url;
      script.onload = function () { URL.revokeObjectURL(url); };
      document.body.appendChild(script);
    }).catch(function (e) {
      loader.textContent = 'Failed to load: ' + (e && e.message ? e.message : e);
    });
  })();

  // Request browser fullscreen in response to user gestures — and re-request
  // every time the user touches after fullscreen has been dropped (e.g. after
  // switching to another tab and back, or after pressing Esc). A toddler-
  // friendly UX: any touch should restore the immersive canvas.
  //
  // Browsers require requestFullscreen to be called inside a real user-
  // activation (pointer or key) event handler, so we can't do it on page load.
  // We listen in the CAPTURE phase so we fire before Compose's canvas handler
  // can consume the event, matching the user-activation contract across
  // Chromium (Chrome/Opera/Edge), Firefox, and Safari.
  const FS_EVENTS = ['click', 'touchend', 'pointerup', 'keydown'];
  function inFullscreen() {
    return !!(document.fullscreenElement
           || document.webkitFullscreenElement
           || document.mozFullScreenElement
           || document.msFullscreenElement);
  }
  function tryEnterFullscreen() {
    if (inFullscreen()) return;
    const el = document.documentElement;
    const req = el.requestFullscreen
             || el.webkitRequestFullscreen
             || el.mozRequestFullScreen
             || el.msRequestFullscreen;
    if (!req) return;
    try {
      const result = req.call(el);
      if (result && typeof result.then === 'function') {
        result.catch(function (err) {
          // Common rejection: "API can only be initiated by a user gesture"
          // — can happen if Compose already marked the event handled, or the
          // browser is rate-limiting after a recent Esc. Next gesture retries.
          console.warn('requestFullscreen rejected, will retry on next gesture:', err);
        });
      }
    } catch (err) {
      console.warn('requestFullscreen threw, will retry on next gesture:', err);
    }
  }
  FS_EVENTS.forEach(function (ev) {
    window.addEventListener(ev, tryEnterFullscreen, true);
  });
</script>
</body>
</html>
