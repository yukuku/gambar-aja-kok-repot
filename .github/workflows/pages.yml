name: Deploy Web (Wasm) to GitHub Pages

on:
  push:
    branches: [main, "claude/add-web-kmp-**", "claude/mario-paint-**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight deployment at a time. Cancel queued runs so we always
# deploy the latest green build.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Wasm production distribution
        run: ./gradlew wasmJsBrowserDistribution

      # Plain downloadable artifact — always uploaded, including on preview
      # branches where Pages isn't the destination. Download the zip from the
      # run's summary page, unzip, and `python3 -m http.server` to test locally.
      - name: Upload web build (downloadable)
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: app/build/dist/wasmJs/productionExecutable
          if-no-files-found: error

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/build/dist/wasmJs/productionExecutable

  # The `on:` filter above already restricts this workflow to `main`,
  # `claude/add-web-kmp-**`, and `claude/mario-paint-**`, so we publish from
  # whichever of those pushed last.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
