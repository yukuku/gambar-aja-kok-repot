name: Deploy Web (Wasm) to GitHub Pages

on:
  push:
    branches: [main, "claude/add-web-kmp-**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight deployment at a time. Cancel queued runs so we always
# deploy the latest green build.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Wasm production distribution
        run: ./gradlew wasmJsBrowserDistribution

      # Plain downloadable artifact — always uploaded, including on preview
      # branches where Pages isn't the destination. Download the zip from the
      # run's summary page, unzip, and `python3 -m http.server` to test locally.
      - name: Upload web build (downloadable)
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: app/build/dist/wasmJs/productionExecutable
          if-no-files-found: error

      # Pages-flavored artifact — only uploaded for the branches we actually
      # publish, so `deploy` below doesn't have to guard against a missing one.
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/build/dist/wasmJs/productionExecutable

  # Deploy only runs on main, so preview pushes to feature branches don't fail
  # the workflow when Pages isn't configured yet / is reserved for production.
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
